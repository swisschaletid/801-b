<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>801-B - Northend Rental Unit</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .captcha-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .captcha-box {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        
        .captcha-box h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
        }
        
        .captcha-box p {
            color: #666;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        
        .math-question {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 18px;
            color: #333;
            font-weight: 600;
        }
        
        .captcha-input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .captcha-input-group input {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            text-align: center;
            transition: border-color 0.3s;
        }
        
        .captcha-input-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .captcha-input-group input::placeholder {
            color: #999;
        }
        
        .error-message {
            color: #d32f2f;
            font-size: 14px;
            margin-bottom: 15px;
            display: none;
        }
        
        .error-message.show {
            display: block;
        }
        
        .captcha-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            font-weight: 600;
            cursor: pointer;
            font-size: 16px;
            transition: transform 0.3s, box-shadow 0.3s;
            width: 100%;
        }
        
        .captcha-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .captcha-btn:active {
            transform: translateY(0);
        }
        
        .hidden {
            display: none !important;
        }
        
        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 600px;
            width: 100%;
            overflow: hidden;
        }
        
        .image-section {
            width: 100%;
            height: 300px;
            overflow: hidden;
            background: #f0f0f0;
            position: relative;
            touch-action: pan-y;
        }
        
        .carousel-container {
            width: 100%;
            height: 100%;
            display: flex;
            transition: transform 0.5s ease-in-out;
        }
        
        .carousel-slide {
            min-width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .carousel-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .carousel-nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.7);
            border: none;
            color: #333;
            font-size: 24px;
            padding: 10px 15px;
            cursor: pointer;
            border-radius: 5px;
            transition: background 0.3s;
            z-index: 10;
        }
        
        .carousel-nav-btn:hover {
            background: rgba(255, 255, 255, 0.9);
        }
        
        .prev-btn {
            left: 10px;
        }
        
        .next-btn {
            right: 10px;
        }
        
        .carousel-dots {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 10;
        }
        
        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .dot.active {
            background: rgba(255, 255, 255, 1);
        }
        
        .content {
            padding: 40px;
            text-align: center;
        }
        
        h1 {
            color: #333;
            margin-bottom: 15px;
            font-size: 28px;
        }
        
        p {
            color: #666;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        
        .email-btn {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: 600;
            transition: transform 0.3s, box-shadow 0.3s;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }
        
        .email-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .email-btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <!-- Math CAPTCHA Overlay -->
    <div class="captcha-overlay" id="captchaOverlay">
        <div class="captcha-box">
            <h2>🔐 Verify Access</h2>
            <p>Solve the math problem to view this property</p>
            <form id="captchaForm">
                <div class="math-question" id="mathQuestion"></div>
                <div class="error-message" id="errorMessage">Incorrect answer. Please try again.</div>
                <div class="captcha-input-group">
                    <input type="number" id="mathAnswer" placeholder="Your answer" autocomplete="off">
                </div>
                <button type="submit" class="captcha-btn">Verify & Continue</button>
            </form>
        </div>
    </div>

    <!-- Main Content (Hidden until CAPTCHA verified) -->
    <div class="container hidden" id="mainContent">
        <div class="image-section" id="imageCarousel">
            <div class="carousel-container" id="carouselContainer">
                <div class="carousel-slide">
                    <img src="pics/living_room.png" alt="801-B Living Room">
                </div>
                <div class="carousel-slide">
                    <img src="pics/bathroom.png" alt="801-B Bathroom">
                </div>
            </div>
            
            <button class="carousel-nav-btn prev-btn" onclick="previousSlide()">❮</button>
            <button class="carousel-nav-btn next-btn" onclick="nextSlide()">❯</button>
            
            <div class="carousel-dots">
                <div class="dot active" onclick="goToSlide(0)"></div>
                <div class="dot" onclick="goToSlide(1)"></div>
            </div>
        </div>
        
        <div class="content">
            <h1>801-B</h1>
            <p>Northend Rental Unit</p>
            <p>Interested in learning more about this property? Get in touch with us today!</p>
            
            <a href="mailto:swisschaletid@gmail.com" class="email-btn">
                ✉️ Contact Us
            </a>
        </div>
    </div>

    <script>
        let mathNum1, mathNum2, mathOperator, correctAnswer;

        // Generate random math question
        function generateMathQuestion() {
            mathNum1 = Math.floor(Math.random() * 20) + 1;
            mathNum2 = Math.floor(Math.random() * 20) + 1;
            
            const operators = ['+', '-', '*'];
            mathOperator = operators[Math.floor(Math.random() * operators.length)];
            
            if (mathOperator === '+') {
                correctAnswer = mathNum1 + mathNum2;
            } else if (mathOperator === '-') {
                correctAnswer = mathNum1 - mathNum2;
            } else if (mathOperator === '*') {
                correctAnswer = mathNum1 * mathNum2;
            }
            
            document.getElementById('mathQuestion').textContent = `What is ${mathNum1} ${mathOperator} ${mathNum2}?`;
            document.getElementById('mathAnswer').value = '';
            document.getElementById('errorMessage').classList.remove('show');
        }

        // Initialize CAPTCHA on page load
        window.addEventListener('load', function() {
            if (sessionStorage.getItem('captchaVerified') === 'true') {
                document.getElementById('captchaOverlay').classList.add('hidden');
                document.getElementById('mainContent').classList.remove('hidden');
            } else {
                generateMathQuestion();
            }
        });

        // Handle CAPTCHA form submission
        document.getElementById('captchaForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const userAnswer = parseInt(document.getElementById('mathAnswer').value);
            
            if (userAnswer === correctAnswer) {
                // Correct answer - hide overlay and show content
                document.getElementById('captchaOverlay').classList.add('hidden');
                document.getElementById('mainContent').classList.remove('hidden');
                
                // Store verification in session storage
                sessionStorage.setItem('captchaVerified', 'true');
            } else {
                // Incorrect answer - show error and generate new question
                document.getElementById('errorMessage').classList.add('show');
                setTimeout(() => {
                    generateMathQuestion();
                }, 1500);
            }
        });

        // Carousel Functions
        let currentSlide = 0;
        const totalSlides = 2;
        let touchStartX = 0;
        let touchEndX = 0;

        const carouselContainer = document.getElementById('carouselContainer');
        const carousel = document.getElementById('imageCarousel');

        // Touch swipe support
        carousel?.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
        }, false);

        carousel?.addEventListener('touchend', (e) => {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        }, false);

        function handleSwipe() {
            const swipeThreshold = 50;
            if (touchStartX - touchEndX > swipeThreshold) {
                nextSlide();
            } else if (touchEndX - touchStartX > swipeThreshold) {
                previousSlide();
            }
        }

        function updateCarousel() {
            const offset = currentSlide * -100;
            carouselContainer.style.transform = `translateX(${offset}%)`;
            updateDots();
        }

        function updateDots() {
            const dots = document.querySelectorAll('.dot');
            dots.forEach((dot, index) => {
                dot.classList.toggle('active', index === currentSlide);
            });
        }

        function nextSlide() {
            currentSlide = (currentSlide + 1) % totalSlides;
            updateCarousel();
        }

        function previousSlide() {
            currentSlide = (currentSlide - 1 + totalSlides) % totalSlides;
            updateCarousel();
        }

        function goToSlide(index) {
            currentSlide = index;
            updateCarousel();
        }

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') nextSlide();
            if (e.key === 'ArrowLeft') previousSlide();
        });
    </script>
</body>
</html>
